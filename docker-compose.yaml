services:

  # ── FastAPI + AgentOS backend ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # env vars injected by Coolify UI — no env_file needed in production
    # for local dev: run  docker compose --env-file .env up
    env_file:
      - path: .env
        required: false
    volumes:
      - ./tmp:/app/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api   # nginx proxies /api/* → backend:7777/*
    # No ports: block — Coolify's Traefik proxy owns 80/443.
    # In Coolify UI → this service → set Port = 80
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
