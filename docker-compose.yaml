services:

  # ── FastAPI + AgentOS backend ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7777:7777"
    volumes:
      - ./tmp:/app/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    environment:
      # Coolify reads SERVICE_FQDN_<SERVICE>_<PORT> to wire up Traefik routing.
      # Set SERVICE_FQDN_FRONTEND_80=https://your-frontend-domain in Coolify UI
      # so Traefik routes your domain → this container port 80 (no host binding needed).
      SERVICE_FQDN_FRONTEND_80: ${SERVICE_FQDN_FRONTEND_80:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
