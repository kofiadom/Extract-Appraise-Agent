services:

  # ── FastAPI + AgentOS backend ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./tmp:/app/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /extract-appraise/backend
        VITE_BASE_PATH: /extract-appraise/frontend/
    environment:
      SERVICE_FQDN_FRONTEND: ${SERVICE_FQDN_FRONTEND}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
