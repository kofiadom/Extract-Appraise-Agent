services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env or Coolify env vars}
      POSTGRES_DB: agno_rag
    volumes:
      - pgdata:/var/lib/postgresql/data
    # NOTE: Port intentionally NOT exposed — only internal services need DB access
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── FastAPI + AgentOS (internal only) ─────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      AGNO_DB_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@postgres:5432/agno_sessions
    env_file: .env
    volumes:
      - ./tmp:/app/tmp
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── NestJS job queue + API (SERVICE_FQDN_BACKEND routes here) ─────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: agno_rag
      FASTAPI_URL: http://fastapi:7777
    env_file: ./backend/.env
    volumes:
      - ./tmp:/app/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    restart: unless-stopped

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /extract-appraise/backend
        VITE_BASE_PATH: /extract-appraise/frontend/
    environment:
      SERVICE_FQDN_FRONTEND: ${SERVICE_FQDN_FRONTEND}
    depends_on:
      backend:
        condition: service_started
      fastapi:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
