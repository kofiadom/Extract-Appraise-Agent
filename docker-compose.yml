services:

  # ── FastAPI + AgentOS backend ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rest-backend
    ports:
      - "7777:7777"      # Also exposed directly for debugging / API docs
    env_file:
      - .env
    volumes:
      - ./tmp:/app/tmp   # Persist uploaded PDFs and converted markdown
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/docs"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api   # nginx proxies /api/* → backend:7777/*
    container_name: rest-frontend
    ports:
      - "80:80"          # Open http://localhost to use the app
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
