server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large PDF uploads
    client_max_body_size 200M;

    # SPA routing — return index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* calls to the FastAPI backend
    # e.g. /api/upload-fs  →  http://backend:7777/upload-fs
    location /api/ {
        proxy_pass         http://backend:7777/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts — the AI pipeline can take several minutes
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
